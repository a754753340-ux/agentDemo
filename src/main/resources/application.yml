agentscope:
  studio:
    enabled: true
    url: http://localhost:3000
    project: chat-backend
    run-name-prefix: stream-chat

chat:
  personalization:
    enabled: true
    base-system-prompt: 你是一个高情商聊天助手，擅长陪伴和引导用户。你的目标是提升用户聊天体验，并适当引导用户继续互动
#    user-tags:
#      "55134":
#        tone: 温柔
#        verbosity: 简洁
#        focus: 结论优先
#        interest: 二次元
  recommend:
    tags:
      - id: age_20_25
        label: 20-25岁
        promptHint: 推荐20-25岁区间用户
        enabled: true
      - id: age_26_30
        label: 26-30岁
        promptHint: 推荐26-30岁区间用户
        enabled: true
      - id: nearby
        label: 同城优先
        promptHint: 推荐同城或距离较近用户
        enabled: true
      - id: extrovert
        label: 活泼开朗
        promptHint: 推荐风格活泼开朗的用户
        enabled: true
  tool-policy:
    recommend:
      intent-patterns:
        - 推荐
        - 找对象
        - 匹配
        - 来\\d+个
        - 给我推荐
        - 换一批
        - 换一个
        - 换
      preference-patterns:
        appearance:
          - 性感
          - 清纯
          - 甜美
          - 御姐
          - 可爱
          - 漂亮
          - 高颜值
          - 美女
        personality:
          - 温柔
          - 活泼
          - 开朗
          - 高冷
          - 幽默
          - 成熟
        interest:
          - 健身
          - 旅行
          - 二次元
          - 游戏
          - 读书
          - 音乐
          - 电影
        scene:
          - 同城
          - 附近
          - 白天
          - 夜晚
      min-preference-signals: 1
      fallback-recommend-count: 5
      direct-recommend-text: 好的，我已根据你的偏好直接为你推荐：
      reject-recommend-text: 如果你需要推荐，我可以根据你的偏好马上帮你筛选。
